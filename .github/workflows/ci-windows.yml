name: CMake CI (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '**'
      - '!**.md'
      - '!documentation/**'
      - '!.vscode/**'
      - '!*.yml'
      - '!*.yaml'
      - '.github/workflows/ci-windows.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**'
      - '!**.md'
      - '!documentation/**'
      - '!.vscode/**'
      - '!*.yml'
      - '!*.yaml'
      - '.github/workflows/ci-windows.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [
          windows-clang-cl-debug,
          windows-clang-cl-release,
          windows-msvc-debug,
          windows-msvc-release
        ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # windows-latest already has Ninja, clang-cl, and msvc environment
     
      - name: Configure CMake
        run: cmake --preset=${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset=${{ matrix.preset }} --target portable_package --verbose

      - name: Run
        shell: pwsh
        working-directory: build/bin/portable
        run: |
          $providersDll = "..\..\_deps\libpiper_ext\install\lib\onnxruntime_providers_shared.dll"
          if (Test-Path $providersDll) {
            Copy-Item -Path $providersDll -Destination .\ -Force
            Write-Host "Copied $providersDll to $(Get-Location)"
          } else {
            Write-Host "Providers DLL not found at $providersDll"
          }
          Get-ChildItem -Force
          .\akhenaten-tts.exe --figure immigrant --lang en --phrase "Who the heck are you?" --output immigrant-hello-stranger.wav
          Get-ChildItem -Force
