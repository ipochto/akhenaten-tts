name: CMake CI (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '**'
      - '!**.md'
      - '!documentation/**'
      - '!.vscode/**'
      - '!*.yml'
      - '!*.yaml'
      - '.github/workflows/ci-windows.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**'
      - '!**.md'
      - '!documentation/**'
      - '!.vscode/**'
      - '!*.yml'
      - '!*.yaml'
      - '.github/workflows/ci-windows.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [
          windows-clang-cl-debug,
          windows-clang-cl-release,
          windows-msvc-debug,
          windows-msvc-release
        ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # windows-latest already has Ninja, clang-cl, and msvc environment

      # Install curl
      - name: Install curl
        run: vcpkg install curl:x64-windows

      - name: Configure CMake
        run: cmake --preset=${{ matrix.preset }} -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build --preset=${{ matrix.preset }} --target portable_package --parallel --verbose

      - name: Run
        shell: pwsh
        working-directory: build/bin/portable
        run: |
          $onnxLibDir = "..\..\_deps\libpiper_ext\install\lib"
          if (Test-Path $onnxLibDir) {
            $onnxDlls = Get-ChildItem -Path $onnxLibDir -Filter "*.dll" -File
            if ($onnxDlls.Count -gt 0) {
              Copy-Item -Path $onnxDlls.FullName -Destination .\ -Force
              Write-Host "Copied DLLs from $onnxLibDir to $(Get-Location):"
              $onnxDlls | Select-Object -ExpandProperty Name | ForEach-Object { Write-Host "  - $_" }
            } else {
              Write-Host "No *.dll files found in $onnxLibDir"
            }
          } else {
            Write-Host "ONNX Runtime lib dir not found at $onnxLibDir"
          }
          function Test-DllLoad([string]$dllName) {
            if (-not (Test-Path $dllName)) {
              Write-Host "[MISS] $dllName"
              return
            }
            try {
              $fullPath = (Resolve-Path $dllName).Path
              $handle = [System.Runtime.InteropServices.NativeLibrary]::Load($fullPath)
              [System.Runtime.InteropServices.NativeLibrary]::Free($handle)
              Write-Host "[OK]   $dllName"
            } catch {
              Write-Host "[FAIL] $dllName :: $($_.Exception.Message)"
            }
          }
          Write-Host "DLL load preflight:"
          Test-DllLoad "akhenaten-tts.exe"
          Test-DllLoad "piper.dll"
          Test-DllLoad "onnxruntime.dll"
          Test-DllLoad "onnxruntime_providers_shared.dll"
          Test-DllLoad "libcurl.dll"
          Test-DllLoad "zlib1.dll"            
          Get-ChildItem -Force
          .\akhenaten-tts.exe --figure immigrant --lang en --phrase "Who the heck are you?" --output immigrant-hello-stranger.wav
          Get-ChildItem -Force
