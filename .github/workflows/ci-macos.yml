name: CMake CI (macOS)

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '**'
      - '!**.md'
      - '!documentation/**'
      - '!.vscode/**'
      - '!*.yml'
      - '!*.yaml'
      - '.github/workflows/ci-macos.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**'
      - '!**.md'
      - '!documentation/**'
      - '!.vscode/**'
      - '!*.yml'
      - '!*.yaml'
      - '.github/workflows/ci-macos.yml'

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [
            macos-clang-debug,
            macos-clang-release
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset=${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset=${{ matrix.preset }} --target portable_package --parallel -- --verbose

      - name: Run
        working-directory: build/bin/portable
        run: |
          echo "Removing _deps for strict portable runtime test"
          rm -rf ../../_deps

          echo "Running akhenaten-tts..."
          ./akhenaten-tts --figure immigrant --lang en --phrase "Who the heck are you?" --output immigrant-hello-stranger.wav

          if [ -f immigrant-hello-stranger.wav ]; then
            echo "Output wav-file found. Test passed."
          else
            echo "Unable to find output wav-file. Test failed."
            exit 1
          fi
